%YAML:1.0

###################################################
# 0. common parameters
###################################################

imu: 1         
num_of_cam: 1  
use_polar: 1
polar_channels: "s0" # "s0,dop,aopsin,aopcos"

# topic and paths
imu_topic: "/ahrs_driver_node/imu_data"
image0_topic: "/arena_cam_qc2/image_raw"
image1_topic: "/arena_cam_qc1/image_raw"
output_path: "/home/dhz/SLAM/output/PolarFP-VINS"
output_name: "dark_2026-04-16-13-59-22_MI_all"

###################################################
# 1.1 Frontend - filter params
###################################################

# filter_type: 0=无滤波, 1=双边滤波, 2=导向滤波, 4=median滤波
polar_filter_type: 2

# 双边滤波参数 (filter_type=1 时使用)
polar_bilateral_d: 9
polar_bilateral_sigma_color: 200
polar_bilateral_sigma_space: 30

# 导向滤波参数 (filter_type=2 时使用)
polar_guided_radius: 8 # guided_radius: 窗口半径（核大小 = 2*radius+1），越大越平滑
polar_guided_eps: 0.0001 # guided_eps: 正则化参数，越大平滑越强，越小越保留细节

# median滤波参数 (filter_type=4 时使用)
polar_median_kernel_size: 9

###################################################
# 1.2 Frontend - detector params
###################################################

# 特征检测器/匹配器配置
feature_detector_type: 0      # 0=GFTT, 1=FAST, 2=SUPERPOINT
fast_threshold: 20
fast_nonmax_suppression: 1

# SuperPoint 参数 (feature_detector_type=2 时使用)
superpoint_model_path: "/home/dhz/ws/vi_catkin_ws/src/PolarFP-VINS/vins_estimator/nn/superpoint_v1.pt"
superpoint_use_gpu: 1
superpoint_keypoint_threshold: 0.015
superpoint_nms_radius: 4

max_cnt: 150            # max feature number in feature tracking
min_dist: 20            # min distance between two features 
F_threshold: 1.0        # ransac threshold (pixel)

###################################################
# 1.3 Frontend - matcher params
###################################################

feature_matcher_type: 0       # 0=LK_FLOW, 1=BRIEF_FLANN
brief_descriptor_bytes: 32
flann_lsh_tables: 20
flann_lsh_key_size: 20
flann_multi_probe: 20
brief_match_dist_ratio: 0.75


###################################################
# 1.4 Frontend - sensor params
###################################################

# camera calibration
cam0_calib: "TRI050S-spin4.yaml"
cam1_calib: "TRI050S-spin4.yaml"
image_width: 612
image_height: 512

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.

# transfer coordinates from cam to imu0 !!!!!!!
body_T_cam0: !!opencv-matrix # T_ic
   rows: 4
   cols: 4
   dt: d
   data: [0.99997566,  0.00437766, -0.00543242, -0.08807137,
          0.00550203, -0.01604921,  0.99985606,  0.02811719,
          0.00428984, -0.99986162, -0.01607291,  0.00748347,
          0.,          0.,          0.,          1.        ]



###################################################
# 1.5 Frontend - other params
###################################################

#Multiple thread support
multiple_thread: 1

#feature traker paprameters
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 
show_track: 1           # publish tracking image as topic
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy


###################################################
# 2. Backend params
###################################################

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.1          # accelerometer measurement noise standard deviation. 
gyr_n: 0.01         # gyroscope measurement noise standard deviation.     
acc_w: 0.001        # accelerometer bias random work noise standard deviation.  
gyr_w: 0.0001       # gyroscope bias random work noise standard deviation.     
g_norm: 9.81007     # gravity magnitude

#unsynchronization parameters
estimate_td: 0                      # online estimate time offset between camera and imu
td: 0.0                             # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
pose_graph_save_path: "/home/dhz/SLAM/output/VINS-Fusion/basic/" # save and load path
save_image: 0                   # save image in pose graph for visualization prupose; you can close this function by setting 0 
